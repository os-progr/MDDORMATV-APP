plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mddorma.tv'
    compileSdk 34

    defaultConfig {
        applicationId "com.mddorma.tv"
        minSdk 21
        targetSdk 34
        versionCode 3
        versionName "1.2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No necesitamos dependencias pesadas, esto mantiene la app ligera
}
